name: Python Tests on Self-Hosted Runner

# Workflow-ku wuxuu socdaa marka code la push gareeyo ama pull request la sameeyo
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    # Ku orod self-hosted runner
    runs-on: self-hosted

    # Tijaabi Python versions kala duwan
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]

    steps:
      # 1️⃣ Checkout repo code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Python version
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # 4️⃣ Run pytest on all test files in 'tests/' folder
      - name: Run tests
        run: |
          pytest tests/ --maxfail=5 --disable-warnings -v
